<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0D191E">
  <meta name="description" content="A Hírbeszéd mobilalkalmazás kattintható prototípusa.">
  <title>Hírbeszéd – mobilprototípus</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/brand/hirbeszed-app-icon-light.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/brand/hirbeszed-app-icon-light.svg">
  <link rel="stylesheet" href="styles.css?v=28">
  <link rel="stylesheet" href="prototype-topics.css?v=2">
  <link rel="stylesheet" href="prototype-settings.css?v=2">
</head>
<body>
  <div class="prototype-note">Kattintható mobilprototípus · a telefonodon teljes képernyőn jelenik meg</div>
  <div id="phone" class="phone-shell">
    <header class="topbar">
      <div class="brand-block" aria-label="Hírbeszéd">
        <img id="brandMark" src="assets/brand/hirbeszed-mark-light.svg" alt="">
        <div>
          <div class="wordmark"><span>Hír</span>beszéd</div>
          <div id="pageTitle" class="page-title">Felolvasó</div>
        </div>
      </div>
      <div id="headerActions" class="header-actions"></div>
    </header>

    <main id="view" class="view" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Fő navigáció">
      <button type="button" data-route="feed" aria-label="Hírfolyam">
        <span class="nav-icon" data-nav-icon="feed">▤</span><span>Hírfolyam</span>
      </button>
      <button type="button" data-route="car" aria-label="Felolvasó">
        <span class="nav-icon" data-nav-icon="reader">▰</span><span>Felolvasó</span>
      </button>
      <button type="button" data-route="assistant" aria-label="Asszisztens">
        <span class="nav-icon" data-nav-icon="assistant">◉</span><span>Asszisztens</span>
      </button>
      <button type="button" data-route="settings" aria-label="Beállítások">
        <span class="nav-icon" data-nav-icon="settings">⚙</span><span>Beállítások</span>
      </button>
    </nav>

    <section id="sheet" class="sheet" aria-hidden="true">
      <header class="sheet-header">
        <button id="sheetBack" class="icon-button sheet-back-button" type="button" data-action="close-sheet" aria-label="Vissza">←</button>
        <div><h2 id="sheetTitle"></h2><p id="sheetSubtitle"></p></div>
      </header>
      <div id="sheetBody" class="sheet-body"></div>
    </section>

    <section id="subscriptionGate" class="subscription-gate" aria-hidden="true">
      <div class="gate-brand"><span class="gate-logo">✦</span><div class="wordmark"><span>Hír</span>beszéd</div></div>
      <div class="gate-copy">
        <span id="gateKicker" class="subscription-kicker"></span>
        <h1 id="gateTitle"></h1>
        <p id="gateCopy"></p>
      </div>
      <div class="gate-plans">
        <button class="gate-plan" data-subscribe="basic"><span><strong>Hírbeszéd Alap</strong><small>Rendszerhang, felolvasó és asszisztens</small></span><b>1500 Ft/hó</b></button>
        <button class="gate-plan pro" data-subscribe="pro"><span><em>AJÁNLOTT</em><strong>Hírbeszéd Pro</strong><small>240 perc prémium AI-hang havonta</small></span><b>3500 Ft/hó</b></button>
      </div>
      <button class="text-button" data-sub-action="restore">Vásárlás visszaállítása</button>
      <p class="gate-note">A fizetést az Apple App Store vagy a Google Play biztonságosan kezeli.</p>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>
  <script src="app.js?v=46"></script>
  <script src="prototype-onboarding.js?v=2"></script>
  <script src="prototype-topics.js?v=2"></script>
  <script src="prototype-settings.js?v=2"></script>
  <script src="prototype-reader-controls.js?v=2"></script>
  <script src="prototype-auth.js?v=2"></script>
  <script src="prototype-layout.js?v=2"></script>
  <script src="prototype-auto-preview.js?v=2"></script>
  <script src="prototype-navigation.js?v=2"></script>
</body>
</html>
