<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hírbeszéd – végleges képernyőrendszer</title>
  <style>
    :root {
      --canvas:#eaf1ef; --ink:#14272d; --muted:#6b7c81; --line:#d9e4e2;
      --paper:#f8fbfa; --card:#fff; --petrol:#173b45; --teal:#2f8178;
      --teal-soft:#dcece9; --coral:#e45f48; --amber:#e6a43b;
    }
    *{box-sizing:border-box} body{margin:0;background:var(--canvas);color:var(--ink);font-family:Inter,Segoe UI,Arial,sans-serif}
    .page-head{max-width:1800px;margin:0 auto;padding:36px 36px 28px}.page-brand{width:360px;height:auto;display:block;margin-bottom:12px}.page-head p{margin:0;color:var(--muted);font-size:15px}
    .legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:20px}.legend span{display:flex;align-items:center;gap:7px;font-size:12px;color:#53666b}.dot{width:9px;height:9px;border-radius:50%;background:var(--teal)}
    .theme-picker{position:sticky;top:12px;z-index:20;display:inline-flex;gap:4px;margin-top:20px;padding:4px;border-radius:18px;background:#fff;border:1px solid var(--line);box-shadow:0 6px 18px rgba(16,33,39,.1)}.theme-picker button{border:0;border-radius:14px;background:transparent;color:var(--muted);padding:8px 14px;font-size:11px;font-weight:750;cursor:pointer}.theme-picker button.on{background:var(--petrol);color:#fff}.theme-board{padding:32px 0 10px}.theme-board[hidden]{display:none}.board-head{max-width:1800px;margin:0 auto 26px;padding:0 36px;display:flex;align-items:center;gap:14px}.board-head h2{font-size:28px;margin:0}.board-head span{font-size:11px;font-weight:800;letter-spacing:.9px;color:var(--teal)}.dark-board{background:#0a151a}.dark-board .board-head h2,.dark-board .group-title b,.dark-board .screen-label b{color:#EDF5F3}.dark-board .board-head span,.dark-board .group-title span,.dark-board .screen-label span{color:#9FB1B4}
    .group{max-width:1800px;margin:0 auto 44px;padding:0 36px}.group-title{display:flex;align-items:center;gap:14px;margin:0 0 18px}.group-title b{font-size:22px}.group-title span{font-size:12px;color:var(--muted);letter-spacing:.7px;text-transform:uppercase}
    .grid{display:grid;grid-template-columns:repeat(5,300px);gap:34px 44px;align-items:start}.screen-wrap{width:300px}.screen-label{height:47px}.screen-label b{display:block;font-size:14px}.screen-label span{display:block;font-size:11px;color:var(--muted);margin-top:4px}
    .phone{position:relative;width:300px;height:650px;border:7px solid #102127;border-radius:34px;background:var(--paper);overflow:hidden;box-shadow:0 12px 24px rgba(16,33,39,.13)}
    .phone.dark{--paper:#0d191e;--card:#15262c;--ink:#edf5f3;--muted:#9fb1b4;--line:#284048;--petrol:#53b8aa;--teal:#53b8aa;--teal-soft:#173d3d;background:var(--paper);color:var(--ink)}
    .status{height:27px;padding:10px 18px 0;display:flex;justify-content:space-between;font-size:9px;font-weight:750}.island{position:absolute;top:8px;left:113px;width:66px;height:18px;border-radius:12px;background:#102127}.dark .island{background:#000}
    .appbar{height:58px;padding:10px 16px 7px;display:flex;align-items:center;gap:9px}.brandmark{width:27px;height:27px;color:transparent;display:grid;place-items:center;font-size:0;background:transparent url('../../assets/brand/hirbeszed-mark-light.svg') center/contain no-repeat}.dark .brandmark{background-image:url('../../assets/brand/hirbeszed-mark-dark.svg')}.titles{min-width:0;flex:1}.titles h2{font-size:15px;line-height:17px;margin:0}.titles h2 .coral,.brandword .coral{color:var(--coral)}.titles p{font-size:10px;margin:3px 0 0;color:var(--muted)}
    .icon{width:28px;height:28px;border:0;background:transparent;color:var(--ink);display:grid;place-items:center;font-size:19px}.content{height:508px;padding:10px 15px 18px;overflow:hidden}.no-nav .content{height:558px}.auth .content{height:600px;padding:22px 20px}.bottom{height:57px;border-top:1px solid var(--line);background:var(--card);display:grid;grid-template-columns:repeat(4,1fr);align-items:center}.navitem{text-align:center;color:var(--muted);font-size:8px}.navitem i{display:block;font-style:normal;font-size:18px;line-height:22px}.navitem.active{color:var(--teal);font-weight:800}
    .hero-brand{text-align:center;padding:28px 0 22px}.hero-brand .brandmark{margin:0 auto 12px;width:54px;height:54px}.hero-brand h1{margin:0;font-size:25px}.hero-brand p{font-size:11px;color:var(--muted);margin:7px 0 0}.brandword{font-weight:780;letter-spacing:-.5px}.eyebrow{font-size:9px;font-weight:800;letter-spacing:.8px;color:var(--teal);text-transform:uppercase}.h1{font-size:22px;line-height:27px;margin:8px 0}.lead{font-size:12px;line-height:17px;color:var(--muted);margin:0 0 18px}
    .btn{width:100%;height:39px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-weight:750;font-size:11px;margin:0 0 9px}.btn.primary{background:var(--petrol);color:white;border-color:var(--petrol)}.btn.social{display:flex;align-items:center;justify-content:center;gap:10px}.btn.danger{color:#c74738;border-color:#efc4bd}.btn.small{width:auto;padding:0 15px;height:32px}
    .or{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:9px;margin:7px 0 12px}.or:before,.or:after{content:"";height:1px;background:var(--line);flex:1}
    .field{height:43px;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:8px 12px;margin-bottom:10px}.field label{display:block;font-size:8px;color:var(--muted)}.field span{font-size:11px;font-weight:650}.code{display:flex;gap:7px;margin:18px 0}.code b{width:34px;height:41px;background:var(--card);border:1px solid var(--line);border-radius:10px;display:grid;place-items:center}
    .progress{display:flex;gap:5px;margin-bottom:22px}.progress i{height:4px;flex:1;border-radius:3px;background:var(--line)}.progress i.on{background:var(--teal)}
    .check-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.check{height:70px;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:11px;position:relative}.check.on{border:2px solid var(--teal);background:var(--teal-soft)}.check b{font-size:11px}.check span{display:block;font-size:18px;margin-bottom:5px}.check em{position:absolute;right:8px;top:8px;font-style:normal;color:var(--teal);font-weight:900}
    .pills{display:flex;gap:6px;margin-bottom:10px;overflow:hidden}.pill{white-space:nowrap;padding:7px 11px;border-radius:14px;border:1px solid var(--line);background:var(--card);font-size:9px;font-weight:700}.pill.on{background:var(--petrol);border-color:var(--petrol);color:white}.seg{display:grid;grid-template-columns:repeat(3,1fr);background:#e5ecea;border-radius:16px;padding:3px;margin-bottom:10px}.dark .seg{background:#13292f}.seg span{text-align:center;padding:7px 2px;font-size:9px;font-weight:750;color:var(--muted)}.seg .on{background:var(--card);border-radius:13px;color:var(--ink)}
    .news{background:var(--card);border:1px solid var(--line);border-radius:17px;margin-bottom:11px;overflow:hidden}.photo{height:125px;position:relative;background:linear-gradient(145deg,#9ebcb8,#326a6c);overflow:hidden}.photo:before{content:"";position:absolute;width:190px;height:90px;border-radius:50%;background:#d3e4df80;right:-30px;top:25px}.photo:after{content:"";position:absolute;left:-15px;right:-20px;height:72px;bottom:-24px;background:#173b4588;transform:rotate(-8deg);border-radius:50%}.photo.city{background:linear-gradient(160deg,#cbdcd8 0 42%,#709b99 43% 64%,#32515b 65%)}.photo.economy{background:linear-gradient(130deg,#c8d7d4 0 38%,#5b8c8c 39% 48%,#1d4652 49%)}
    .news-body{padding:11px 12px}.meta{font-size:8px;font-weight:800}.meta .new{color:var(--coral)}.meta .time{color:var(--muted);font-weight:600}.news h3{font-size:14px;line-height:18px;margin:8px 0 7px}.news p{font-size:10px;line-height:14px;color:var(--muted);margin:0}.save{float:right;font-size:18px}.compact{display:grid;grid-template-columns:82px 1fr;gap:10px;padding:9px}.compact .photo{height:82px;border-radius:11px}.compact h3{font-size:11px;line-height:14px;margin:5px 0}.read{opacity:.67}
    .section-title{display:flex;justify-content:space-between;align-items:center;margin:2px 0 10px}.section-title h3{font-size:14px;margin:0}.section-title a{font-size:9px;color:var(--teal);font-weight:750}
    .searchbox{height:39px;border-radius:13px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:0 11px;color:var(--muted);font-size:10px;margin-bottom:11px}.searchbox b{color:var(--ink)}
    .list{background:var(--card);border:1px solid var(--line);border-radius:15px;overflow:hidden;margin-bottom:13px}.row{min-height:48px;padding:10px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}.row:last-child{border-bottom:0}.row .ri{width:26px;height:26px;border-radius:8px;background:var(--teal-soft);color:var(--teal);display:grid;place-items:center}.row .rt{flex:1}.row b{font-size:10px;display:block}.row small{display:block;font-size:8px;color:var(--muted);margin-top:3px}.chev{color:var(--muted)}.toggle{width:33px;height:19px;background:#bdc9c7;border-radius:11px;padding:2px}.toggle:after{content:"";display:block;width:15px;height:15px;border-radius:50%;background:#fff}.toggle.on{background:var(--teal)}.toggle.on:after{margin-left:14px}.radio{width:17px;height:17px;border:1.5px solid var(--line);border-radius:50%}.radio.on{border:5px solid var(--teal)}
    .article-img{height:180px;margin:-10px -15px 12px;background:linear-gradient(160deg,#c5d8d4 0 43%,#789f9a 44% 62%,#234a55 63%);position:relative}.article h1{font-size:20px;line-height:25px;margin:9px 0}.article p{font-size:11px;line-height:17px;color:#43575c}.article-actions{display:flex;gap:8px;margin:12px 0}.action{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center;font-size:9px;background:var(--card)}
    .car .content{height:508px;padding:12px 15px;background:var(--paper)}.car-photo{height:245px;border-radius:20px;background:linear-gradient(160deg,#8fb0ad 0 45%,#315a64 46%);position:relative;overflow:hidden}.car-photo:after{content:"";position:absolute;width:230px;height:100px;border-radius:50%;background:#d7e5e250;bottom:-35px;left:-20px}.car-state{text-align:center;margin:15px 0 8px}.car-state span{font-size:9px;color:var(--coral);font-weight:850;letter-spacing:.8px}.car-state h2{font-size:18px;line-height:22px;margin:7px 0}.wave{height:22px;display:flex;gap:3px;justify-content:center;align-items:center}.wave i{width:3px;height:8px;border-radius:4px;background:var(--teal)}.wave i:nth-child(2n){height:17px}.wave i:nth-child(3n){height:12px}.wave i:nth-child(4){background:var(--coral)}.car-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.car-btn{height:68px;border-radius:16px;background:var(--card);border:1px solid var(--line);text-align:center;padding:9px 3px;font-size:8px;font-weight:750}.car-btn i{display:block;font-style:normal;font-size:22px;margin-bottom:4px}.car-btn:first-child i{color:var(--coral)}.car-btn.off{color:var(--muted)}.car-help{text-align:center;color:var(--muted);font-size:8px;margin-top:10px}
    .assistant-hero{text-align:center;padding:18px 0}.assistant-hero .eyebrow{color:var(--coral)}.orb{width:88px;height:88px;margin:0 auto 14px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#77d1c3,#2f8178 55%,#173b45);box-shadow:0 0 0 10px var(--teal-soft);display:grid;place-items:center;color:white;font-size:29px}.assistant-hero h2{font-size:18px;margin:0 0 5px}.assistant-hero p{font-size:10px;color:var(--muted);margin:0}.suggestions{display:grid;gap:8px;margin-top:18px}.suggestion{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px;font-size:10px}.composer{position:absolute;bottom:58px;left:14px;right:14px;height:43px;border:1px solid var(--line);border-radius:16px;background:var(--card);display:flex;align-items:center;padding:0 10px;font-size:10px;color:var(--muted)}.composer b{margin-left:auto;width:28px;height:28px;border-radius:50%;background:var(--teal);color:white;display:grid;place-items:center}.bubble{max-width:84%;padding:10px 12px;border-radius:14px;background:var(--card);border:1px solid var(--line);font-size:10px;line-height:15px;margin-bottom:9px}.bubble.me{margin-left:auto;background:var(--teal);color:#fff;border-color:var(--teal)}.source-chip{display:inline-block;margin-top:7px;font-size:8px;color:var(--teal);font-weight:750}
    .big-icon{width:82px;height:82px;border-radius:25px;background:var(--teal-soft);display:grid;place-items:center;font-size:36px;margin:18px auto}.center{text-align:center}.hint{font-size:9px;color:var(--muted);line-height:14px}.footer-note{text-align:center;color:var(--muted);font-size:8px;margin-top:10px}.palette{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.swatch{height:60px;border-radius:12px;padding:8px;font-size:8px;font-weight:750;border:1px solid var(--line);position:relative}.phone:not(.dark) .swatch.light-option,.phone.dark .swatch.dark-option{border:2px solid var(--teal)}.phone:not(.dark) .swatch.light-option:after,.phone.dark .swatch.dark-option:after{content:"✓";position:absolute;right:7px;top:6px;color:var(--teal);font-weight:900}.range{height:4px;background:var(--line);border-radius:3px;margin:13px 0;position:relative}.range:after{content:"";position:absolute;left:0;top:0;width:58%;height:4px;background:var(--teal);border-radius:3px}.range:before{content:"";position:absolute;left:55%;top:-5px;width:14px;height:14px;border-radius:50%;background:var(--teal);z-index:2}
    @media(max-width:1650px){.grid{grid-template-columns:repeat(4,300px)}}
    @media(max-width:1320px){.grid{grid-template-columns:repeat(3,300px)}}
  </style>
</head>
<body>
  <header class="page-head">
    <img class="page-brand" src="../../assets/brand/hirbeszed-logo-light.svg" alt="Hírbeszéd">
    <p>Végleges vizuális alap · 33 mobilképernyő · világos és sötét téma · v1.0</p>
    <div class="legend"><span><i class="dot"></i> Navigáció és általános kijelölés</span><span><i class="dot" style="background:var(--coral)"></i> Márka, új vagy élő állapot</span><span>A korall csak kiemelt jelentésben jelenik meg</span></div>
    <div class="theme-picker" role="group" aria-label="Témaelőnézet">
      <button type="button" data-theme="light">Világos</button>
      <button type="button" data-theme="dark">Sötét</button>
      <button type="button" data-theme="both" class="on">Mindkettő</button>
    </div>
  </header>
  <main id="app"></main>
  <script>
    const nav = (active='feed') => `<nav class="bottom">
      <div class="navitem ${active==='feed'?'active':''}"><i>▤</i>Hírfolyam</div>
      <div class="navitem ${active==='car'?'active':''}"><i>▰</i>Felolvasó</div>
      <div class="navitem ${active==='ai'?'active':''}"><i>◉</i>Asszisztens</div>
      <div class="navitem ${active==='settings'?'active':''}"><i>⚙</i>Beállítások</div></nav>`;
    const status = `<div class="status"><b>9:41</b><span>▮▮ ◔ ▱</span></div><div class="island"></div>`;
    const appbar = (section, actions='⌕ ♧') => `<header class="appbar"><div class="brandmark">Hírbeszéd</div><div class="titles"><h2><span class="coral">Hír</span>beszéd</h2><p>${section}</p></div>${actions.split(' ').filter(Boolean).map(x=>`<button class="icon">${x}</button>`).join('')}</header>`;
    const simplebar = (title, sub='') => `<header class="appbar"><button class="icon">‹</button><div class="titles"><h2>${title}</h2>${sub?`<p>${sub}</p>`:''}</div></header>`;
    const shell = (s, theme='light') => `<article class="screen-wrap"><div class="screen-label"><b>${s.n}. ${s.label}</b><span>${s.desc}</span></div><section class="phone ${theme==='dark'?'dark':''} ${s.auth?'auth no-nav':''} ${s.noNav?'no-nav':''} ${s.car?'car':''}">${status}${s.bar||''}<div class="content">${s.body}</div>${s.nav?nav(s.nav):''}</section></article>`;
    const row=(icon,title,sub='',end='›')=>`<div class="row"><span class="ri">${icon}</span><span class="rt"><b>${title}</b>${sub?`<small>${sub}</small>`:''}</span><span class="chev">${end}</span></div>`;
    const toggle=(on=true)=>`<span class="toggle ${on?'on':''}"></span>`;
    const news=(compact=false,read=false)=>compact?`<div class="news compact ${read?'read':''}"><div class="photo economy"></div><div><span class="meta">PORTFOLIO <span class="time">· 28 perce</span></span><h3>Így változhatnak a hazai energiaárak</h3><span class="meta time">GAZDASÁG</span><span class="save">♧</span></div></div>`:`<div class="news ${read?'read':''}"><div class="photo city"></div><div class="news-body"><span class="save">♧</span><span class="meta"><span class="new">●</span> HVG <span class="time">· 12 perce</span></span><h3>Új közlekedési változások lépnek életbe a fővárosban</h3><p>A hétvégétől több útvonal és menetrend is módosul.</p></div></div>`;
    const group=(title,sub,screens,theme)=>`<section class="group"><h2 class="group-title"><b>${title}</b><span>${sub}</span></h2><div class="grid">${screens.map(s=>shell(s,theme)).join('')}</div></section>`;

    const authScreens = [
      {n:'01',label:'Indítás',desc:'Márka és rövid betöltési állapot',auth:true,body:`<div class="hero-brand" style="padding-top:150px"><div class="brandmark">Hírbeszéd</div><h1 class="brandword"><span class="coral">Hír</span>beszéd</h1><p>Hírek, amelyek veled haladnak.</p></div><div class="center"><span class="eyebrow">RSS · HANG · ASSZISZTENS</span></div>`},
      {n:'02',label:'Belépés',desc:'Öt regisztrációs lehetőség',auth:true,body:`<div class="hero-brand"><div class="brandmark">Hírbeszéd</div><h1 class="brandword"><span class="coral">Hír</span>beszéd</h1><p>Jelentkezz be a folytatáshoz</p></div><button class="btn social">● Folytatás Apple-lel</button><button class="btn social">G Folytatás Google-lel</button><button class="btn social">f Folytatás Facebookkal</button><div class="or">vagy</div><button class="btn">Belépés e-maillel</button><button class="btn">Belépés telefonszámmal</button><p class="footer-note">A folytatással elfogadod a felhasználási feltételeket.</p>`},
      {n:'03',label:'Ellenőrzés',desc:'E-mail- vagy SMS-kód',auth:true,body:`<button class="icon">‹</button><div class="big-icon">✉</div><div class="center"><span class="eyebrow">Biztonságos belépés</span><h1 class="h1">Írd be a kapott kódot</h1><p class="lead">Hatjegyű kódot küldtünk a megadott elérhetőségre.</p></div><div class="code"><b>2</b><b>8</b><b>4</b><b>1</b><b>9</b><b>6</b></div><button class="btn primary">Ellenőrzés</button><button class="btn">Kód újraküldése</button>`},
      {n:'04',label:'Témaválasztás',desc:'Első beállítás · 1/4',auth:true,body:`<div class="progress"><i class="on"></i><i></i><i></i><i></i></div><span class="eyebrow">Érdeklődés</span><h1 class="h1">Mi érdekel?</h1><p class="lead">Válassz legalább három témát. Később bármikor módosíthatod.</p><div class="check-grid"><div class="check on"><span>🏛</span><b>Belföld</b><em>✓</em></div><div class="check on"><span>🌍</span><b>Világhírek</b><em>✓</em></div><div class="check"><span>⚽</span><b>Sport</b></div><div class="check on"><span>📈</span><b>Gazdaság</b><em>✓</em></div><div class="check"><span>💻</span><b>Technológia</b></div><div class="check"><span>🎭</span><b>Kultúra</b></div></div><button class="btn primary" style="margin-top:18px">Tovább</button>`},
      {n:'05',label:'Forrásválasztás',desc:'Első beállítás · 2/4',auth:true,body:`<div class="progress"><i class="on"></i><i class="on"></i><i></i><i></i></div><span class="eyebrow">RSS-források</span><h1 class="h1">Honnan érkezzenek a hírek?</h1><p class="lead">Az ajánlott magyar források később kikapcsolhatók.</p><div class="list">${row('H','HVG','Belföld · Gazdaság',toggle())}${row('T','Telex','Közélet · Világ',toggle())}${row('P','Portfolio','Gazdaság',toggle())}${row('N','Nemzeti Sport','Sport',toggle(false))}</div><button class="btn primary">Tovább · 3 kiválasztva</button>`},
      {n:'06',label:'Hangbeállítás',desc:'Első beállítás · 3/4',auth:true,body:`<div class="progress"><i class="on"></i><i class="on"></i><i class="on"></i><i></i></div><span class="eyebrow">Felolvasás</span><h1 class="h1">Hogyan szóljon?</h1><p class="lead">Próbáld ki a magyar hangot és állítsd be a tempót.</p><div class="big-icon">◉</div><button class="btn primary">▶ Hangminta lejátszása</button><div class="section-title"><h3>Beszédsebesség</h3><a>1,0×</a></div><div class="range"></div><div class="list">${row('A','Magyar hang 1','Természetes · ajánlott','●')}${row('B','Magyar hang 2','Határozott','○')}</div><button class="btn primary">Tovább</button>`},
